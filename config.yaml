# ── Design Pipeline (v1.0) ──
# Spec evolution: delta analysis → chunking → implementation per chunk
design:
  analyzer_model: "claude-opus-4-6"       # Delta analysis needs strong reasoning
  refiner_model: "claude-sonnet-4-6"      # Chunking is more mechanical
  max_tasks_per_chunk: 10                 # Cap tasks per chunk
  max_design_iterations: 3               # Max times to re-chunk after drift

# ── Layer 4: Integration Validation (v0.8) ──
# 跨模組整合驗證：type 匹配、API contract、import 正確性
layer4:
  enabled: false               # 預設關閉（需要專案配置 typecheck 指令）
  typecheck_cmd: ""            # e.g. "npx tsc --noEmit"
  api_contract_check: true     # LLM 檢查跨模組 API contract
  model: "claude-sonnet-4-6"   # Sonnet 足夠做 contract checking
  run_after_cycle: 2           # cycle N 之後才跑（等模組穩定）
