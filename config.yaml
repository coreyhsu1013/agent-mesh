# Agent Mesh v0.6.5 Configuration
# ============================

version: "0.7.1"

# ── Planner ──
planner:
  provider: "gemini"
  classify: "gemini-3-flash-preview"   # Phase 1: task classification
  backend: "gemini-3-flash-preview"    # Phase 2: backend planning
  frontend: "claude-opus-4-6"          # Phase 2: frontend/UI planning
  fallback: "claude-opus-4-6"          # when all else fails
  timeout: 300

# ── Routing Matrix (escalation chains per complexity, smoke-tested) ──
routing:
  matrix:
    L:   # Lite: scaffolding, config, boilerplate — no cross-task imports
      chain:
        - "xai/grok-4-fast-non-reasoning"
        - "xai/grok-4-1-fast-non-reasoning"
        - "xai/grok-code-fast-1"
        - "claude-sonnet-4-6"
    S:   # Simple: simple logic, imports types/services/schemas from other tasks
      chain:
        - "xai/grok-code-fast-1"
        - "xai/grok-4-1-fast-non-reasoning"
        - "deepseek/deepseek-reasoner"
        - "claude-sonnet-4-6"
    M:   # Medium: auth logic, business rules, middleware, tests
      chain:
        - "xai/grok-4-fast-reasoning"
        - "xai/grok-code-fast-1"
        - "deepseek/deepseek-reasoner"
        - "claude-sonnet-4-6"
        - "claude-opus-4-6"
    H:   # Hard: architecture, security, payment, cross-module integration
      chain:
        - "xai/grok-4-1-fast-reasoning"
        - "claude-sonnet-4-6"
        - "claude-opus-4-6"
        - "claude-opus-4-6"              # retry with 2× timeout

# ── Timeouts per runner type (seconds) ──
timeouts:
  aider:
    idle: 300               # Grok 需要更長 idle
    max: 600
  claude:
    idle: 600               # Sonnet/Opus 都需要長 idle
    max_sonnet: 600
    max_opus: 1200
    idle_opus: 600
  gemini:
    max: 300

# ── Agents ──
agents:
  claude_code:
    enabled: true
    # Opus: 架構、安全、review（最強推理）
    model_opus: "claude-opus-4-6"
    timeout_opus: 1200
    idle_timeout_opus: 600   # ★ Opus 思考久，獨立 idle timeout
    # Sonnet: M 複雜度 coding（快 3x, 省 5x, 接近 Opus 水準）
    model_sonnet: "claude-sonnet-4-6"
    timeout_sonnet: 600
    max_parallel: 2
    # 什麼情況用 Opus（其他用 Sonnet）
    use_opus_for:
      - complexity_H
      - architecture
      - security
      - auth
      - payment
      - review

  deepseek_aider:
    enabled: true
    # v0.6.5: only reasoner (chat tier removed — too weak for TypeScript)
    model_reasoner: "deepseek/deepseek-reasoner"
    timeout_reasoner: 600
    api_key_env: "DEEPSEEK_API_KEY"
    max_parallel: 3

  grok_aider:
    enabled: true
    model: "xai/grok-code-fast-1"
    timeout: 600
    api_key_env: "XAI_API_KEY"

  codex:
    enabled: false

# ── Heartbeat ──
heartbeat:
  idle_timeout: 600       # 連續 N 秒沒 stdout → 判定卡住（所有 model 統一 600s）
  # max_timeout 用各 agent 自己的 timeout_* 值

# ── ReAct Loop ──
react:
  max_attempts: 3
  run_tests: true
  run_build: true
  run_lint: false
  retry_delay_base: 5

# ── Reviewer ──
reviewer:
  provider: "claude"
  model: "claude-opus-4-6"     # Review 永遠用 Opus
  auto_approve_on_attempt: 3
  diff_max_chars: 10000
  timeout: 120

# ── Dispatcher ──
dispatcher:
  max_parallel: 7
  semaphore_claude: 2
  semaphore_deepseek: 3
  retry_delay: 30

# ── Model Loading Target ──
# Claude Opus:   ~15% (H complexity + review)
# Claude Sonnet: ~15% (M complexity Claude tasks + escalation)
# Grok:          ~40% (L/M complexity, first choice for code tasks)
# DeepSeek:      ~10% (fallback / specific tasks)
# Gemini:        ~20% (planning + verify)

# ── Model Ranking & Outer-Loop Escalation (v0.7.5) ──
model_ranking:
  tiers:
    - name: "budget"
      prefixes: ["xai/"]
    - name: "standard"
      prefixes: ["deepseek/", "claude-sonnet"]
    - name: "premium"
      prefixes: ["claude-opus"]
  escalation:
    gap_reduction_threshold: 0.15    # escalate if gaps reduce < 15%
    max_retries_at_top_tier: 3       # #1 (Opus) gets 3 tries before give up
    timeout_extension: 1.5           # multiply timeout each retry at top tier

# ── Verify (v0.7) ──
verify:
  build_cmd: "pnpm build"
  test_cmd: "npx turbo test"
  lint_cmd: "npx turbo lint"
  skip_lint: true          # many projects don't have lint configured
  skip_test: false
  # ── Convergence settings (v0.7.4) ──
  exclude_modules: []                    # e.g. ["Module 1: Android Capture Service"]
  max_new_gaps_per_cycle: 5
  convergence_threshold: 3               # remaining + new <= this → converged
  regression_model: "claude-sonnet-4-6"  # cheaper model for regression check
  scan_model: "claude-opus-4-6"          # stronger model for new gap scan
