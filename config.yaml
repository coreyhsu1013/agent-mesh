# Agent Mesh v0.6.5 Configuration
# ============================

version: "0.7.1"

# ── Planner ──
planner:
  provider: "gemini"
  classify: "gemini-3-flash-preview"     # intent + complexity classification
  backend: "deepseek/deepseek-reasoner"  # backend-heavy planning
  frontend: "xai/grok-3-fast"            # frontend / UI planning
  fallback: "claude-sonnet-4-6"          # when all else fails
  timeout: 300

# ── Routing Matrix (escalation chains per complexity, smoke-tested) ──
routing:
  matrix:
    L:   # Low: CRUD, boilerplate, docs, CSS, tests
      chain:
        - "xai/grok-4-fast-non-reasoning"
        - "xai/grok-4-1-fast-non-reasoning"
        - "deepseek/deepseek-reasoner"
        - "xai/grok-code-fast-1"
        - "claude-sonnet-4-6"
    M:   # Medium: API endpoints, services, stateful components
      chain:
        - "xai/grok-4-fast-reasoning"
        - "xai/grok-code-fast-1"
        - "deepseek/deepseek-reasoner"
        - "claude-sonnet-4-6"
        - "claude-opus-4-6"
    H:   # High: architecture, auth, payment, security
      chain:
        - "xai/grok-4-1-fast-reasoning"
        - "claude-sonnet-4-6"
        - "claude-opus-4-6"
        - "claude-opus-4-6"              # retry with 2× timeout

# ── Timeouts per runner type (seconds) ──
timeouts:
  aider:
    idle: 300               # Grok 需要更長 idle
    max: 600
  claude:
    idle: 600               # Sonnet/Opus 都需要長 idle
    max_sonnet: 600
    max_opus: 1200
    idle_opus: 600
  gemini:
    max: 300

# ── Agents ──
agents:
  claude_code:
    enabled: true
    # Opus: 架構、安全、review（最強推理）
    model_opus: "claude-opus-4-6"
    timeout_opus: 1200
    idle_timeout_opus: 600   # ★ Opus 思考久，獨立 idle timeout
    # Sonnet: M 複雜度 coding（快 3x, 省 5x, 接近 Opus 水準）
    model_sonnet: "claude-sonnet-4-6"
    timeout_sonnet: 600
    max_parallel: 2
    # 什麼情況用 Opus（其他用 Sonnet）
    use_opus_for:
      - complexity_H
      - architecture
      - security
      - auth
      - payment
      - review

  deepseek_aider:
    enabled: true
    # v0.6.5: only reasoner (chat tier removed — too weak for TypeScript)
    model_reasoner: "deepseek/deepseek-reasoner"
    timeout_reasoner: 600
    api_key_env: "DEEPSEEK_API_KEY"
    max_parallel: 3

  grok_aider:
    enabled: true
    model: "xai/grok-code-fast-1"
    timeout: 600
    api_key_env: "XAI_API_KEY"

  codex:
    enabled: false

# ── Heartbeat ──
heartbeat:
  idle_timeout: 600       # 連續 N 秒沒 stdout → 判定卡住（所有 model 統一 600s）
  # max_timeout 用各 agent 自己的 timeout_* 值

# ── ReAct Loop ──
react:
  max_attempts: 3
  run_tests: true
  run_build: true
  run_lint: false
  retry_delay_base: 5

# ── Reviewer ──
reviewer:
  provider: "claude"
  model: "claude-opus-4-6"     # Review 永遠用 Opus
  auto_approve_on_attempt: 3
  diff_max_chars: 10000
  timeout: 120

# ── Dispatcher ──
dispatcher:
  max_parallel: 4
  semaphore_claude: 2
  semaphore_deepseek: 3
  retry_delay: 30

# ── Model Loading Target ──
# Claude Opus:   ~15% (H complexity + review)
# Claude Sonnet: ~15% (M complexity Claude tasks + escalation)
# Grok:          ~40% (L/M complexity, first choice for code tasks)
# DeepSeek:      ~10% (fallback / specific tasks)
# Gemini:        ~20% (planning + verify)

# ── Verify (v0.7) ──
verify:
  build_cmd: "pnpm build"
  test_cmd: "npx turbo test"
  lint_cmd: "npx turbo lint"
  skip_lint: true          # many projects don't have lint configured
  skip_test: false
